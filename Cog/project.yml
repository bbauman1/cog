name: Cog
options:
  bundleIdPrefix: com.cogfordevin
  deploymentTarget:
    iOS: "26.0"
  xcodeVersion: "26.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    TARGETED_DEVICE_FAMILY: "1"
    DEVELOPMENT_TEAM: "$(APPLE_TEAM_ID)"

targets:
  Cog:
    type: application
    platform: iOS
    sources:
      - path: Sources
      - path: Resources
    settings:
      base:
        INFOPLIST_FILE: Sources/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.cogfordevin.ios
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "3"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      configs:
        Release:
          CODE_SIGN_STYLE: Manual
          CODE_SIGN_IDENTITY: "Apple Distribution"
          PROVISIONING_PROFILE_SPECIFIER: "$(COG_MAIN_PROFILE_NAME)"
    info:
      path: Sources/Info.plist
      properties:
        CFBundleName: "Cog"
        CFBundleDisplayName: "Cog"
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        CFBundleIconName: "AppIcon"
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        ITSAppUsesNonExemptEncryption: false
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: true
        NSCameraUsageDescription: "Cog uses the camera to capture photos for session attachments."
        NSPhotoLibraryUsageDescription: "Cog accesses your photo library to attach images to sessions."
        NSMicrophoneUsageDescription: "Cog uses the microphone to transcribe your voice into text for session prompts and messages."
        NSSpeechRecognitionUsageDescription: "Cog uses on-device speech recognition to convert your voice to text."
        CFBundleURLTypes:
          - CFBundleURLSchemes:
              - cog
            CFBundleURLName: com.cogfordevin.ios

  CogTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Tests
    dependencies:
      - target: Cog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.cogfordevin.ios.tests
        GENERATE_INFOPLIST_FILE: YES
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Cog.app/Cog"
        BUNDLE_LOADER: "$(TEST_HOST)"

schemes:
  Cog:
    build:
      targets:
        Cog: all
        CogTests: [test]
    test:
      targets:
        - name: CogTests
