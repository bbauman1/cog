name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: macos-26
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 26
        run: |
          XCODE_PATH=$(ls -d /Applications/Xcode_26*.app 2>/dev/null | sort -V | tail -1)
          if [ -z "$XCODE_PATH" ]; then
            echo "::error::No Xcode 26.x found on this runner"
            ls /Applications/Xcode*.app
            exit 1
          fi
          echo "Using $XCODE_PATH"
          sudo xcode-select -s "$XCODE_PATH/Contents/Developer"
          xcodebuild -version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        working-directory: Cog
        run: xcodegen generate

      - name: Test
        working-directory: Cog
        run: |
          xcodebuild test \
            -project Cog.xcodeproj \
            -scheme Cog \
            -destination 'platform=iOS Simulator,name=iPhone 17e' \
            -derivedDataPath build/DerivedData/ci \
            CODE_SIGNING_ALLOWED=NO
