name: Deploy to TestFlight

on:
  push:
    branches: [main]

concurrency:
  group: testflight-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: macos-26
    timeout-minutes: 45
    env:
      APP_ID: "6777732746"
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 26
        run: |
          # Find the latest Xcode 26.x installed on the runner
          XCODE_PATH=$(ls -d /Applications/Xcode_26*.app 2>/dev/null | sort -V | tail -1)
          if [ -z "$XCODE_PATH" ]; then
            echo "::error::No Xcode 26.x found on this runner"
            ls /Applications/Xcode*.app
            exit 1
          fi
          echo "Using $XCODE_PATH"
          sudo xcode-select -s "$XCODE_PATH/Contents/Developer"
          xcodebuild -version
          xcodebuild -showsdks 2>/dev/null | grep -i ios || true

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        working-directory: Cog
        run: xcodegen generate

      - name: Install asc CLI
        uses: rudrankriyam/setup-asc@v1

      - name: Install Python dependencies
        run: python3 -m pip install --user PyJWT cryptography requests

      - name: Write ASC API key
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_PRIVATE_KEY: ${{ secrets.ASC_PRIVATE_KEY }}
        run: |
          KEY_PATH="$RUNNER_TEMP/AuthKey_${ASC_KEY_ID}.p8"

          # Reformat PEM: handles single-line, missing newlines, or correct format
          printf '%s' "$ASC_PRIVATE_KEY" \
            | tr -d '\r' \
            | sed 's/-----BEGIN PRIVATE KEY-----//' \
            | sed 's/-----END PRIVATE KEY-----//' \
            | tr -d ' \n' \
            | fold -w 64 \
            | { echo "-----BEGIN PRIVATE KEY-----"; cat; echo; echo "-----END PRIVATE KEY-----"; } \
            > "$KEY_PATH"
          chmod 600 "$KEY_PATH"

          echo "Key file: $(wc -l < "$KEY_PATH") lines, $(wc -c < "$KEY_PATH") bytes"

          if ! openssl pkey -in "$KEY_PATH" -noout 2>/dev/null; then
            echo "::error::ASC_PRIVATE_KEY could not be parsed. Verify the .p8 contents."
            exit 1
          fi

          asc auth login --bypass-keychain --name "CI" \
            --key-id "$ASC_KEY_ID" \
            --issuer-id "$ASC_ISSUER_ID" \
            --private-key "$KEY_PATH"

      - name: Prepare distribution signing
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_PRIVATE_KEY: ${{ secrets.ASC_PRIVATE_KEY }}
          APPLE_TEAM_ID: Y9ZLF8R6XZ
          APPLE_DIST_KEY_PEM: ${{ secrets.APPLE_DIST_KEY_PEM }}
        run: |
          mkdir -p "$HOME/.asc"
          cp "$RUNNER_TEMP/AuthKey_${ASC_KEY_ID}.p8" "$HOME/.asc/AuthKey_${ASC_KEY_ID}.p8"

          python3 scripts/setup_signing.py

          KEYCHAIN="$RUNNER_TEMP/cog-signing.keychain-db"
          KEYCHAIN_PASSWORD="$(uuidgen)"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security list-keychains -d user -s "$KEYCHAIN" $(security list-keychains -d user | sed 's/"//g')
          security import "$HOME/.asc/apple_dist_chain.p12" \
            -k "$KEYCHAIN" \
            -P devin \
            -T /usr/bin/codesign \
            -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN"

          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp "$HOME/.asc/Cog Distribution.mobileprovision" \
            ~/Library/MobileDevice/Provisioning\ Profiles/
          cp "$HOME/.asc/Cog_Widget_Distribution.mobileprovision" \
            ~/Library/MobileDevice/Provisioning\ Profiles/

          echo "Installed profiles: $(ls ~/Library/MobileDevice/Provisioning\ Profiles/*.mobileprovision 2>/dev/null | wc -l)"

      - name: Read version from project.yml
        id: version
        working-directory: Cog
        run: |
          VERSION=$(grep 'MARKETING_VERSION:' project.yml | head -1 | sed 's/.*"\(.*\)"/\1/')
          echo "VERSION=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Get next build number
        id: build-number
        run: |
          BUILD_NUMBER=$(asc builds next-build-number \
            --app "$APP_ID" \
            --version "${{ steps.version.outputs.VERSION }}" \
            --platform IOS \
            --initial-build-number 1 \
            --output json | jq -r '.nextBuildNumber')
          echo "BUILD_NUMBER=$BUILD_NUMBER" >> "$GITHUB_OUTPUT"
          echo "Build: ${{ steps.version.outputs.VERSION }} ($BUILD_NUMBER)"

      - name: Archive
        working-directory: Cog
        run: |
          asc xcode archive \
            --project Cog.xcodeproj \
            --scheme Cog \
            --configuration Release \
            --archive-path "$RUNNER_TEMP/Cog.xcarchive" \
            --clean \
            --overwrite \
            --xcodebuild-flag=-destination \
            --xcodebuild-flag="generic/platform=iOS" \
            --xcodebuild-flag="CURRENT_PROJECT_VERSION=${{ steps.build-number.outputs.BUILD_NUMBER }}"

      - name: Export IPA
        run: |
          asc xcode export \
            --archive-path "$RUNNER_TEMP/Cog.xcarchive" \
            --export-options Cog/.asc/export-options.plist \
            --ipa-path "$RUNNER_TEMP/Cog.ipa" \
            --overwrite \
            --timeout 10m

      - name: Validate IPA
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
        run: |
          # Copy API key to altool's expected location
          mkdir -p ~/.private_keys
          cp "$RUNNER_TEMP/AuthKey_${ASC_KEY_ID}.p8" ~/.private_keys/
          xcrun altool --validate-app \
            --file "$RUNNER_TEMP/Cog.ipa" \
            --type ios \
            --apiKey "$ASC_KEY_ID" \
            --apiIssuer "$ASC_ISSUER_ID" 2>&1 || true

      - name: Publish to TestFlight
        run: |
          asc publish testflight \
            --app "$APP_ID" \
            --ipa "$RUNNER_TEMP/Cog.ipa" \
            --group "Internal" \
            --wait \
            --poll-interval 15s

      - name: Cleanup
        if: always()
        run: |
          rm -f "$RUNNER_TEMP/AuthKey_"*.p8
