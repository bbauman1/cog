name: Deploy to TestFlight

on:
  push:
    branches: [main]

concurrency:
  group: testflight-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: macos-26
    timeout-minutes: 45
    env:
      APP_ID: "6777732746"
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 26
        run: |
          # Find the latest Xcode 26.x installed on the runner
          XCODE_PATH=$(ls -d /Applications/Xcode_26*.app 2>/dev/null | sort -V | tail -1)
          if [ -z "$XCODE_PATH" ]; then
            echo "::error::No Xcode 26.x found on this runner"
            ls /Applications/Xcode*.app
            exit 1
          fi
          echo "Using $XCODE_PATH"
          sudo xcode-select -s "$XCODE_PATH/Contents/Developer"
          xcodebuild -version
          xcodebuild -showsdks 2>/dev/null | grep -i ios || true

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        working-directory: Cog
        run: xcodegen generate

      - name: Install asc CLI
        uses: rudrankriyam/setup-asc@v1

      - name: Write ASC API key
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_PRIVATE_KEY: ${{ secrets.ASC_PRIVATE_KEY }}
        run: |
          KEY_PATH="$RUNNER_TEMP/AuthKey_${ASC_KEY_ID}.p8"

          # Reformat PEM: handles single-line, missing newlines, or correct format
          printf '%s' "$ASC_PRIVATE_KEY" \
            | tr -d '\r' \
            | sed 's/-----BEGIN PRIVATE KEY-----//' \
            | sed 's/-----END PRIVATE KEY-----//' \
            | tr -d ' \n' \
            | fold -w 64 \
            | { echo "-----BEGIN PRIVATE KEY-----"; cat; echo; echo "-----END PRIVATE KEY-----"; } \
            > "$KEY_PATH"
          chmod 600 "$KEY_PATH"

          echo "Key file: $(wc -l < "$KEY_PATH") lines, $(wc -c < "$KEY_PATH") bytes"

          if ! openssl pkey -in "$KEY_PATH" -noout 2>/dev/null; then
            echo "::error::ASC_PRIVATE_KEY could not be parsed. Verify the .p8 contents."
            exit 1
          fi

          asc auth login --bypass-keychain --name "CI" \
            --key-id "$ASC_KEY_ID" \
            --issuer-id "$ASC_ISSUER_ID" \
            --private-key "$KEY_PATH"

      - name: Fetch and install provisioning profiles
        run: |
          mkdir -p ./signing

          asc signing fetch \
            --bundle-id com.cogfordevin.ios \
            --profile-type IOS_APP_STORE \
            --output ./signing \
            --create-missing

          asc signing fetch \
            --bundle-id com.cogfordevin.ios.sessions-widget \
            --profile-type IOS_APP_STORE \
            --output ./signing \
            --create-missing 2>&1 || true

          # Install provisioning profiles
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp ./signing/*.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/ 2>/dev/null || true

          echo "Installed profiles: $(ls ~/Library/MobileDevice/Provisioning\ Profiles/*.mobileprovision 2>/dev/null | wc -l)"

      - name: Read version from project.yml
        id: version
        working-directory: Cog
        run: |
          VERSION=$(grep 'MARKETING_VERSION:' project.yml | head -1 | sed 's/.*"\(.*\)"/\1/')
          echo "VERSION=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Get next build number
        id: build-number
        run: |
          BUILD_NUMBER=$(asc builds next-build-number \
            --app "$APP_ID" \
            --version "${{ steps.version.outputs.VERSION }}" \
            --platform IOS \
            --initial-build-number 1 \
            --output json | jq -r '.nextBuildNumber')
          echo "BUILD_NUMBER=$BUILD_NUMBER" >> "$GITHUB_OUTPUT"
          echo "Build: ${{ steps.version.outputs.VERSION }} ($BUILD_NUMBER)"

      - name: Archive
        working-directory: Cog
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
        run: |
          asc xcode archive \
            --project Cog.xcodeproj \
            --scheme Cog \
            --configuration Release \
            --archive-path "$RUNNER_TEMP/Cog.xcarchive" \
            --clean \
            --overwrite \
            --xcodebuild-flag=-destination \
            --xcodebuild-flag="generic/platform=iOS" \
            --xcodebuild-flag=-allowProvisioningUpdates \
            --xcodebuild-flag=-authenticationKeyPath \
            --xcodebuild-flag="$RUNNER_TEMP/AuthKey_${ASC_KEY_ID}.p8" \
            --xcodebuild-flag=-authenticationKeyID \
            --xcodebuild-flag="$ASC_KEY_ID" \
            --xcodebuild-flag=-authenticationKeyIssuerID \
            --xcodebuild-flag="$ASC_ISSUER_ID" \
            --xcodebuild-flag="CURRENT_PROJECT_VERSION=${{ steps.build-number.outputs.BUILD_NUMBER }}"

      - name: Export IPA
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
        run: |
          asc xcode export \
            --archive-path "$RUNNER_TEMP/Cog.xcarchive" \
            --export-options Cog/.asc/export-options.plist \
            --ipa-path "$RUNNER_TEMP/Cog.ipa" \
            --overwrite \
            --timeout 10m \
            --xcodebuild-flag=-allowProvisioningUpdates \
            --xcodebuild-flag=-authenticationKeyPath \
            --xcodebuild-flag="$RUNNER_TEMP/AuthKey_${ASC_KEY_ID}.p8" \
            --xcodebuild-flag=-authenticationKeyID \
            --xcodebuild-flag="$ASC_KEY_ID" \
            --xcodebuild-flag=-authenticationKeyIssuerID \
            --xcodebuild-flag="$ASC_ISSUER_ID"

      - name: Inspect IPA contents
        run: |
          mkdir -p "$RUNNER_TEMP/ipa_inspect"
          cd "$RUNNER_TEMP/ipa_inspect"
          unzip -o "$RUNNER_TEMP/Cog.ipa"

          APP_PATH=$(find . -name "*.app" -type d | head -1)
          echo "=== App bundle: $APP_PATH ==="

          echo "=== Info.plist (relevant keys) ==="
          /usr/libexec/PlistBuddy -c "Print :CFBundleIconName" "$APP_PATH/Info.plist" 2>&1 || echo "CFBundleIconName NOT FOUND"
          /usr/libexec/PlistBuddy -c "Print :CFBundleIcons" "$APP_PATH/Info.plist" 2>&1 || echo "CFBundleIcons NOT FOUND"
          /usr/libexec/PlistBuddy -c "Print :CFBundleIcons~ipad" "$APP_PATH/Info.plist" 2>&1 || echo "CFBundleIcons~ipad NOT FOUND"

          echo "=== Full Info.plist ==="
          plutil -p "$APP_PATH/Info.plist"

          echo "=== Asset catalog (.car) files ==="
          find "$APP_PATH" -name "*.car" -type f

          echo "=== All icon-related files ==="
          find "$APP_PATH" -iname "*icon*" -o -iname "*appicon*" | head -30

          echo "=== Top-level bundle contents ==="
          ls -la "$APP_PATH/"

          echo "=== Asset catalog contents (if assetutil available) ==="
          CAR_FILE=$(find "$APP_PATH" -name "Assets.car" -type f | head -1)
          if [ -n "$CAR_FILE" ]; then
            xcrun --sdk iphoneos assetutil --info "$CAR_FILE" 2>/dev/null | grep -A5 -i "icon" | head -40 || true
          fi

          rm -rf "$RUNNER_TEMP/ipa_inspect"

      - name: Validate IPA
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
        run: |
          # Copy API key to altool's expected location
          mkdir -p ~/.private_keys
          cp "$RUNNER_TEMP/AuthKey_${ASC_KEY_ID}.p8" ~/.private_keys/
          xcrun altool --validate-app \
            --file "$RUNNER_TEMP/Cog.ipa" \
            --type ios \
            --apiKey "$ASC_KEY_ID" \
            --apiIssuer "$ASC_ISSUER_ID" 2>&1 || true

      - name: Publish to TestFlight
        run: |
          asc publish testflight \
            --app "$APP_ID" \
            --ipa "$RUNNER_TEMP/Cog.ipa" \
            --group "Internal" \
            --wait \
            --poll-interval 15s

      - name: Cleanup
        if: always()
        run: |
          rm -f "$RUNNER_TEMP/AuthKey_"*.p8
